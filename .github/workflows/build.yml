name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Checkout & toolchain
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # -----------------------------------------------------------------------
      # Dependencies & checks
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      # -----------------------------------------------------------------------
      # Debug APK (every push / PR)
      # -----------------------------------------------------------------------
      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tally-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # -----------------------------------------------------------------------
      # Release APK (only on version tags: v1.0.0, v1.2.3, etc.)
      # Requires these repository secrets to be set:
      #   KEYSTORE_BASE64   — base64-encoded .jks keystore file
      #   KEYSTORE_PASSWORD — store password
      #   KEY_ALIAS         — key alias inside the keystore
      #   KEY_PASSWORD      — key password
      # See DEVELOPMENT.md for instructions on generating and encoding the key.
      # -----------------------------------------------------------------------
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/tally-release.jks

      - name: Write key.properties
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=tally-release.jks
          EOF

      - name: Configure Gradle signing
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Patch build.gradle to load key.properties and apply signingConfig
          python3 - <<'PYEOF'
          import re, pathlib

          gradle = pathlib.Path('android/app/build.gradle')
          text = gradle.read_text()

          # Insert keystoreProperties block before android { if not already present
          if 'keystoreProperties' not in text:
              insert = '''def keystorePropertiesFile = rootProject.file("key.properties")
          def keystoreProperties = new Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          '''
              text = insert + text

          # Add signingConfigs block inside android { if not already present
          if 'signingConfigs' not in text:
              text = text.replace(
                  'android {',
                  '''android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }''',
                  1
              )

          # Wire release buildType to use signingConfigs.release
          text = re.sub(
              r'(release\s*\{)(\s*)(// TODO: Add your own signing config)',
              r'\1\2signingConfig signingConfigs.release',
              text
          )
          # Also try the plain release block
          if 'signingConfig signingConfigs.release' not in text:
              text = re.sub(
                  r'(buildTypes\s*\{[^}]*release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release',
                  text,
                  flags=re.DOTALL
              )

          gradle.write_text(text)
          print("build.gradle patched for signing")
          PYEOF

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build apk --release

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Tally ${{ github.ref_name }}
          body: |
            ## Tally ${{ github.ref_name }}

            Install: download `tally-release.apk`, transfer to your Android device and open it.

            **Requires Android 6.0+.** Enable *Install from unknown sources* if prompted.
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
